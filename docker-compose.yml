version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: fluxio-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./db/clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fluxio-postgres
    environment:
      POSTGRES_USER: fluxio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxio_password}
      POSTGRES_DB: fluxioclient
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  suricata:
    image: jasonish/suricata:latest
    container_name: fluxio-suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/logs:/var/log/suricata
    command: -i any
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fluxio-backend
    ports:
      - "${PORT:-80}:8080"
      - "${NETFLOW_PORT:-2055}:2055/udp"
      - "${TZSP_PORT:-37008}:37008/udp"
    volumes:
      - ./suricata/logs:/var/log/suricata:ro
      - ./backend/geoip:/root/geoip:ro
    environment:
      - CLICKHOUSE_DSN=${CLICKHOUSE_DSN:-clickhouse://default:@clickhouse:9000/fluxio}
      - POSTGRES_DSN=postgres://fluxio:${POSTGRES_PASSWORD:-fluxio_password}@postgres:5432/fluxioclient?sslmode=disable
      - WAZUH_MANAGER_IP=${WAZUH_MANAGER_IP:-}
      - WAZUH_MANAGER_PORT=${WAZUH_MANAGER_PORT:-1514}
      - NETFLOW_PORT=${NETFLOW_PORT:-2055}
      - TZSP_PORT=${TZSP_PORT:-37008}
      - SURICATA_EVE_LOG_PATH=${SURICATA_EVE_LOG_PATH:-/var/log/suricata/eve.json}
      - GEOIP_CITY_DB=/root/geoip/GeoLite2-City.mmdb
      - GEOIP_ASN_DB=/root/geoip/GeoLite2-ASN.mmdb
    depends_on:
      - clickhouse
      - postgres

volumes:
  clickhouse-data:
  postgres-data:
